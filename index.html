<!DOCTYPE html><html lang=en><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1,user-scalable=no"><meta name=theme-color content=#000><link rel=manifest href=manifest.json><title>NextTrain</title><style>
:root{--bg:#fff;--fg:#000;--gray:#888;--light:#ddd;--green:#008000;--red:#c00;--bnr:#fff;--bnrf:#000}
body.dk{--bg:#000;--fg:#fff;--gray:#aaa;--light:#333;--green:#0f0;--red:#f33;--bnr:#000;--bnrf:#fff}
*{box-sizing:border-box}
body{margin:0;font:16px system-ui,sans-serif;background:var(--bg);color:var(--fg);-webkit-tap-highlight-color:transparent}
#a{display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{background:var(--bnr);color:var(--bnrf);padding:8px;text-align:center;font-weight:900;letter-spacing:1px;cursor:pointer;z-index:10;font-size:1.2rem;transition:background 0.2s}
.nav{display:flex;align-items:center;background:var(--bg);border-bottom:1px solid var(--light);min-height:44px;padding:0 8px}
.nav h2{margin:0;font-size:1rem;flex:1;text-align:center;font-weight:700;color:var(--fg)}
.nav button{background:none;border:none;color:var(--fg);font-size:1.5rem;padding:0 8px;cursor:pointer;width:40px}
#L{flex:1;overflow-y:auto}
.p{padding:20px;text-align:center;color:var(--gray)}
.i{padding:12px;border-bottom:1px solid var(--light);display:flex;align-items:center;min-height:56px}
.i:active{background:rgba(128,128,128,0.1)}
.ic{width:44px;height:44px;position:relative;margin-right:12px;flex-shrink:0}
.tx{flex:1;overflow:hidden}
.t1{font-weight:700;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t2{font-size:14px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act{color:var(--fg);justify-content:center;font-weight:500;min-height:44px}
.chk{width:22px;height:22px;border:2px solid var(--fg);margin-left:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chk.on::after{content:'\2713';font-size:18px}
.ar{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--light)}
.ar-l{display:flex;align-items:center;gap:12px}
.ar-r{text-align:right}
.tm{font-size:20px;font-weight:700}
.st{font-size:14px;font-weight:700}
.st.green{color:var(--green)}
.st.red{color:var(--red)}
.hs{font-size:14px;color:var(--gray)}
#b{position:fixed;top:0;left:0;right:0;height:2px;background:#29f;display:none;z-index:11}
input{background:var(--light);color:var(--fg);border:1px solid var(--light);padding:8px;border-radius:4px;width:100%;font-size:16px}
.sb{padding:10px;border-bottom:1px solid var(--light)}
.tg{display:flex;align-items:center;justify-content:space-between;width:100%}
.sec{background:var(--light);padding:4px 12px;font-size:12px;font-weight:700;color:var(--gray)}
.ed{display:flex;gap:8px;margin-left:8px}
.ed b{padding:4px 8px;border:1px solid var(--light);border-radius:4px;font-size:14px}
</style>
<div id=b></div>
<div id=a>
<header onclick="stk=[{v:'home'}];render()">NextTrain</header>
<div class=nav><button id=back style="visibility:hidden">&lsaquo;</button><h2 id=sub></h2><button id=eb>&vellip;</button></div>
<div id=L></div>
</div>
<script>
const W='https://nt.sloccy.workers.dev',C='nt_s',F='nt_f',T='nt_t',R='nt_r',e=i=>document.getElementById(i),t=new TextDecoder;
let S=[],f=[],rs=null,dk=0,ed=0,stk=[],cache={};

try{f=JSON.parse(localStorage.getItem(F))||[]}catch(e){f=[]}
if(!Array.isArray(f))f=[];
try{rs=JSON.parse(localStorage.getItem(R))}catch(e){rs=null}
dk=localStorage.getItem(T)=='1';

if(dk)document.body.classList.add('dk');

const api=async p=>{e('b').style.display='block';try{const r=await fetch(W+p);if(!r.ok)throw r;return {b:new Uint8Array(await r.arrayBuffer()),h:r.headers}}catch(err){console.error(err);throw err}finally{e('b').style.display='none'}};
const ps=b=>{if(!b||b.length<6)return [];try{let p=6,c=b[4]|b[5]<<8,res=[];for(let i=0;i<c;i++){let l=b[p++];if(l===undefined)break;let s=t.decode(b.subarray(p,p+l));p+=l;let rc=b[p++];if(rc===undefined)break;let rs=[];for(let j=0;j<rc;j++){let r=b[p++],g=b[p++],bl=b[p++],rl=b[p++],rn=t.decode(b.subarray(p,p+rl));p+=rl;let d=String.fromCharCode(b[p++]),hl=b[p++],h=t.decode(b.subarray(p,p+hl));p+=hl;rs.push({c:`rgb(${r},${g},${bl})`,n:rn,d,h})}res.push({s,r:rs,n:s.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())})}return res}catch(e){console.error(e);return []}};

const go=(v,p)=>{stk.push({v,p});render()};
const pop=()=>{if(stk.length>1){stk.pop();render()}};
e('back').onclick=pop;
e('eb').onclick=()=>{ed=!ed;render()};

const drawIcon=(s,fav)=>{
  const n=Math.min(fav?.routes?.length||0,4);
  const cv=document.createElement('canvas');cv.width=cv.height=44;const x=cv.getContext('2d');
  if(!n)return cv.toDataURL();
  const rts=(fav.routes||[]).map(fr=>{
    const d={0:'N',1:'S',2:'E',3:'W'};
    return (s?.r||[]).find(r=>r.n[0]==fr.r&&r.d==d[fr.d]);
  }).filter(x=>x);
  if(!rts.length)return cv.toDataURL();

  const mid=18,ox=4,oy=4,e=35;
  const rr=(ctx,x,y,w,h,r)=>{if(ctx.roundRect)ctx.roundRect(x,y,w,h,r);else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}};
  if(rts.length==1){
    x.fillStyle=rts[0].c;x.beginPath();rr(x,ox,oy,36,36,3);x.fill();
    x.fillStyle='#fff';x.font='bold 24px system-ui';x.textAlign='center';x.textBaseline='middle';
    x.fillText(rts[0].n[0],22,23);
    x.strokeStyle='#000';x.lineWidth=1;x.strokeText(rts[0].n[0],22,23);
  }else{
    x.fillStyle='#fff';x.fillRect(ox,oy,36,36);
    let segs=[0,0,1,1,1,1,0,0]; // 2 routes
    if(n==3) segs=[0,1,1,2,2,2,2,0];
    if(n==4) segs=[0,1,1,3,3,2,2,0];
    const pts=[[ox,oy,ox+mid,oy],[ox+mid,oy,ox+e,oy],[ox+e,oy,ox+e,oy+mid],[ox+e,oy+mid,ox+e,oy+e],[ox+e,oy+e,ox+mid,oy+e],[ox+mid,oy+e,ox,oy+e],[ox,oy+e,ox,oy+mid],[ox,oy+mid,ox,oy]];
    x.lineWidth=2;
    segs.forEach((ri,i)=>{if(rts[ri]){x.strokeStyle=rts[ri].c;x.beginPath();x.moveTo(pts[i][0],pts[i][1]);x.lineTo(pts[i][2],pts[i][3]);x.stroke()}});
    x.fillStyle='#000';x.font='bold 14px system-ui';x.textAlign='center';x.textBaseline='middle';
    const slots=[[ox+9,oy+9],[ox+27,oy+9],[ox+9,oy+27],[ox+27,oy+27]];
    if(n==2){x.fillText(rts[0].n[0],slots[0][0],slots[0][1]);x.fillText(rts[1].n[0],slots[3][0],slots[3][1])}
    else if(n==3){x.fillText(rts[0].n[0],slots[0][0],slots[0][1]);x.fillText(rts[1].n[0],slots[1][0],slots[1][1]);x.fillText(rts[2].n[0],22,oy+27)}
    else{rts.forEach((r,i)=>x.fillText(r.n[0],slots[i][0],slots[i][1]))}
  }
  const ds=new Set((fav.routes||[]).map(r=>r.d));
  x.fillStyle='#c00';
  const ar=(cx,cy,rot)=>{x.save();x.translate(cx,cy);x.rotate(rot);x.beginPath();x.moveTo(0,-4);x.lineTo(-3,1);x.lineTo(3,1);x.fill();x.strokeStyle='#000';x.lineWidth=0.5;x.stroke();x.restore()};
  if(ds.has('0'))ar(22,2,0);if(ds.has('1'))ar(22,42,Math.PI);if(ds.has('2'))ar(42,22,Math.PI/2);if(ds.has('3'))ar(2,22,-Math.PI/2);
  return cv.toDataURL();
};

const render=()=>{
  if(!stk.length)return;
  try{
    const {v,p}=stk[stk.length-1];
    e('back').style.visibility=stk.length>1?'visible':'hidden';
    e('eb').style.display=(v=='home')?'block':'none';
    e('sub').innerText=(v=='home')?'':(p?.s?.n||'');
    const L=e('L');L.innerHTML='';
    
    if(v=='home'){
      try{rs=JSON.parse(localStorage.getItem(R)||'null')}catch(e){rs=null}
      if(f && f.length) L.insertAdjacentHTML('beforeend','<div class=sec>FAVORITES</div>');
      (f||[]).forEach((fav,i)=>{
        try{
          const s=(S||[]).find(x=>x.s==fav.s);
          const div=document.createElement('div');div.className='i';
          const cData=cache[fav.s+fav.r]||{txt:'Loading...',cls:''};
          div.innerHTML=`<div class=ic><img src="${drawIcon(s,fav)}" width=44 height=44></div><div class=tx><div class=t1>${fav.n||s?.n||fav.s}</div><div class="t2 ${cData.cls}">${cData.txt}</div></div>`;
          if(ed){
            const ctr=document.createElement('div');ctr.className='ed';
            ctr.innerHTML=`<b onclick="event.stopPropagation();move(${i},-1)">\u2191</b><b onclick="event.stopPropagation();move(${i},1)">\u2193</b><b onclick="event.stopPropagation();ren(${i})">R</b>`;
            div.appendChild(ctr);
          }
          div.onclick=()=>go('arrivals',{s,fav});
          L.appendChild(div);
          if(!cache[fav.s+fav.r]) fetchSub(fav);
        }catch(err){console.error(err)}
      });
      if(rs){
        try{
          const s=(S||[]).find(x=>x.s==rs.s);
          const div=document.createElement('div');div.className='i';
          div.innerHTML=`<div class=ic><img src="${drawIcon(s,rs)}" width=44 height=44></div><div class=tx><div class=t1>${s?.n||rs.s}</div><div class=t2>Tap to view</div></div>`;
          div.onclick=()=>go('arrivals',{s,r:rs.r});
          L.appendChild(div);
        }catch(err){console.error(err)}
      }
      L.insertAdjacentHTML('beforeend','<div class="i act" onclick="go(\'picker\',{q:\'\'})">+ New Search</div><div class="i act" onclick="go(\'settings\')">Settings</div>');
    }
    
    if(v=='picker'){
      e('sub').innerText='Select Station';
      const box=document.createElement('div');box.className='sb';
      box.innerHTML=`<input id=si placeholder="Search stations..." value="${p.q||''}">`;
      L.appendChild(box);
      const input=e('si');setTimeout(()=>input.focus(),50);
      input.oninput=()=>{p.q=input.value.toLowerCase();renderList()};
      const listDiv=document.createElement('div');L.appendChild(listDiv);
      const renderList=()=>{
        listDiv.innerHTML='';
        const filtered=S.filter(s=>s.n.toLowerCase().includes(p.q));
        if(!filtered.length) listDiv.innerHTML='<div class=p>No stations found</div>';
        filtered.forEach(s=>{
          const div=document.createElement('div');div.className='i';
          div.innerHTML=`<div class=tx><div class=t1>${s.n}</div></div>`;
          div.onclick=()=>go('routes',{s,sel:[]});
          listDiv.appendChild(div);
        });
      };
      renderList();
    }
    
    if(v=='routes'){
      p.s.r.forEach((r,i)=>{
        const div=document.createElement('div');div.className='i';
        const is=p.sel.includes(i);
        div.innerHTML=`<div class=ic><img src="${drawIcon(p.s,{routes:[{r:r.n[0],d:({N:'0',S:'1',E:'2',W:'3'})[r.d]}]})}" width=44 height=44></div><div class=tx><div class=t1>${r.h}</div><div class=t2>(${r.d})</div></div><div class="chk${is?' on':''}"></div>`;
        div.onclick=()=>{if(is)p.sel=p.sel.filter(x=>x!=i);else p.sel.push(i);render()};
        L.appendChild(div);
      });
      if(p.sel.length){
        const ok=document.createElement('div');ok.className='i act';ok.innerText='Show Arrivals';
        ok.onclick=()=>{
          const dm={N:'0',S:'1',E:'2',W:'3'};
          const rp=p.sel.map(i=>p.s.r[i].n[0]+dm[p.s.r[i].d]).join('');
          const rss={s:p.s.s,r:rp,routes:p.sel.map(i=>({r:p.s.r[i].n[0],d:dm[p.s.r[i].d]}))};
          localStorage.setItem(R,JSON.stringify(rss));
          rs=rss;
          go('arrivals',{s:p.s,r:rp});
        };
        L.appendChild(ok);
      }
    }
    
    if(v=='arrivals'){
      const rParam=p.fav?p.fav.r:p.r;
      const isF=f.find(x=>x.s==p.s.s&&x.r==rParam);
      const listCont=document.createElement('div');L.appendChild(listCont);
      listCont.innerHTML='<div class=p>...</div>';
      (async()=>{
        try {
          const {b}=await api('/a?s='+p.s.s+'&r='+rParam);
          listCont.innerHTML='';
          if(!isF){
            const addBtn=document.createElement('div');addBtn.className='i act';addBtn.innerText='\u2606 Add Favorite';
            addBtn.onclick=()=>{
              const routes=[];for(let i=0;i<rParam.length;i+=2)routes.push({r:rParam[i],d:rParam[i+1]});
              f.push({s:p.s.s,r:rParam,n:p.s.n,routes});
              localStorage.setItem(F,JSON.stringify(f));
              stk=[{v:'home'}];render();
            };
            listCont.appendChild(addBtn);
          }
          let ptr=1;
          for(let i=0;i<b[0];i++){
            let rl=b[ptr++],rn=t.decode(b.subarray(ptr,ptr+rl));ptr+=rl;
            let D=String.fromCharCode(b[ptr++]),m=b[ptr++]<<8|b[ptr++],st=new Int8Array([b[ptr++]])[0];
            let x=p.s.r.find(r=>r.n==rn&&r.d==D)||{c:'#888',h:''},lbl="Scheduled",cls='';
            if(st==-128) {lbl="Canceled";cls='red'}
            else if(st==-127) {lbl="Skipped";cls='red'}
            else if(st==-126) {lbl="On time";cls='green'}
            else if(st>0) {lbl="Delayed "+st+"m";cls='green'}
            else if(st<0) {lbl="Early "+Math.abs(st)+"m";cls='red'}
            const T=new Date;T.setHours(m/60,m%60);
            const timeStr=T.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
            if(i==0) cache[p.s.s+rParam]={txt:`Next: ${timeStr} (${rn})`,cls};
            const div=document.createElement('div');div.className='ar';
            div.innerHTML=`<div class=ar-l><img src="${drawIcon(p.s,{routes:[{r:rn[0],d:({N:'0',S:'1',E:'2',W:'3'})[D]}]})}" width=44 height=44><div class=tx><div class=hs>${x.h}</div><div class="st ${cls}">${lbl}</div></div></div><div class=ar-r><div class=tm>${timeStr}</div><div class=hs>${rn}</div></div>`;
            listCont.appendChild(div);
          }
          if(!b[0])listCont.insertAdjacentHTML('beforeend','<div class=p>No arrivals</div>');
          if(isF){
            const remBtn=document.createElement('div');remBtn.className='i act';remBtn.innerText='\u2605 Remove Favorite';
            remBtn.onclick=()=>{f=f.filter(x=>!(x.s==p.s.s&&x.r==rParam));localStorage.setItem(F,JSON.stringify(f));render()};
            listCont.appendChild(remBtn);
          }
        } catch(e) { listCont.innerHTML='<div class=p>Error</div>' }
      })();
    }

    if(v=='settings'){
      e('sub').innerText='Settings';
      const setDiv=document.createElement('div');L.appendChild(setDiv);
      setDiv.innerHTML=`<div class=i id=dt><div class=tg><span>Dark Mode</span><div class="chk${dk?' on':''}"></div></div></div><div class="i act" id=rf>Refresh Station Data</div>`;
      e('dt').onclick=()=>{
        dk=!dk;
        localStorage.setItem(T,dk?1:0);
        document.body.classList.toggle('dk',dk);
        render();
      };
      e('rf').onclick=async()=>{
        try{const {b}=await api('/s');S=ps(b);localStorage.setItem(C,JSON.stringify([...b]));alert('OK')}catch(e){alert('Err')}
      };
    }
  }catch(err){console.error(err)}
};

window.move=(i,d)=>{const n=i+d;if(n>=0&&n<f.length){[f[i],f[n]]=[f[n],f[i]];localStorage.setItem(F,JSON.stringify(f));render()}};
window.ren=(i)=>{const n=prompt('Name?',f[i].n||f[i].s);if(n){f[i].n=n;localStorage.setItem(F,JSON.stringify(f));render()}};

const fetchSub=async(fav)=>{
  try{
    const {b}=await api('/a?s='+fav.s+'&r='+fav.r);
    if(b[0]){
      let ptr=1;ptr+=b[ptr]+1;ptr++;let m=b[ptr++]<<8|b[ptr++],st=new Int8Array([b[ptr++]])[0],cls='';
      if(st==-128||st==-127||st<0)cls='red';else if(st==-126||st>0)cls='green';
      const T=new Date;T.setHours(m/60,m%60);
      cache[fav.s+fav.r]={txt:`Next: ${T.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}`,cls};
      if(stk[stk.length-1].v=='home')render();
    }
  }catch(e){}
};

(async()=>{
  const c=localStorage.getItem(C);if(c){try{S=ps(new Uint8Array(JSON.parse(c)));}catch(e){}}
  stk=[{v:'home'}];
  try{render()}catch(e){console.error(e)}
  try{const {b}=await api('/s');S=ps(b);localStorage.setItem(C,JSON.stringify([...b]));render()}catch(e){console.error(e)}
})();
navigator.serviceWorker?.register('sw.js');
</script>
</html>
