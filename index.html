<!DOCTYPE html>
<html lang=en>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name=theme-color media="(prefers-color-scheme: light)" content="#F2EBDC">
<meta name=theme-color media="(prefers-color-scheme: dark)" content="#0E0B08">
<meta name=apple-mobile-web-app-capable content=yes>
<meta name=mobile-web-app-capable content=yes>
<meta name=apple-mobile-web-app-status-bar-style content=black-translucent>
<meta name=apple-mobile-web-app-title content=NextTrain>
<link rel=manifest href=manifest.json>
<link rel=apple-touch-icon href=apple-touch-icon-180.png>
<link rel=preconnect href=https://nt.sloccy.workers.dev crossorigin>
<title>NextTrain</title>
<style>
@font-face{font-family:'IBM Plex Mono';src:url(fonts/ibm-plex-mono-400.woff2)format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'IBM Plex Mono';src:url(fonts/ibm-plex-mono-500.woff2)format('woff2');font-weight:500;font-display:swap}
@font-face{font-family:'DM Sans';src:url(fonts/dm-sans.woff2)format('woff2');font-weight:100 700;font-display:swap}
@font-face{font-family:'Doto';src:url(fonts/doto.woff2)format('woff2');font-weight:100 900;font-display:swap}
:root{
  --bg:#F2EBDC;--bg-2:#E8DEC6;--fg:#1A1612;--fg-2:#6A6055;
  --hairline:#D4CAB4;--accent:#C46A1A;--accent-soft:rgba(196,106,26,.14);
  --green:#3F7D2E;--red:#B53824;
  --bnr:#1A1612;--bnrf:#F2EBDC;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'DM Sans',system-ui,sans-serif;
  --dot:'Doto',ui-monospace,monospace;
  --shadow:0 1px 0 rgba(26,22,18,.04),0 8px 24px -12px rgba(26,22,18,.18);
}
body.dk{
  --bg:#0E0B08;--bg-2:#181410;--fg:#F2EBDC;--fg-2:#9C8E76;
  --hairline:#2B241B;--accent:#FFB939;--accent-soft:rgba(255,185,57,.18);
  --green:#6BD46B;--red:#FF6149;
  --bnr:#0E0B08;--bnrf:#FFB939;
  --shadow:0 1px 0 rgba(0,0,0,.4),0 12px 32px -12px rgba(0,0,0,.6);
}
*{box-sizing:border-box}
body{
  margin:0;font:400 16px/1.4 var(--sans);
  background:var(--bg);color:var(--fg);
  -webkit-tap-highlight-color:transparent;overscroll-behavior:none;
  background-image:radial-gradient(ellipse 120% 50% at 50% 0,var(--bg-2),transparent 60%);
  -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
}
input,textarea,[contenteditable=true]{-webkit-user-select:text;user-select:text;}
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
header{
  background:var(--bg-2);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  cursor:pointer;z-index:10;
  display:flex;align-items:baseline;justify-content:space-between;
  border-bottom:2px solid var(--accent);
}
.hdr-wm{
  font:800 30px/1 var(--dot);
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--accent);
}
.hdr-rt{
  font:700 13px/1 var(--dot);
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--accent);opacity:.6;
}
.nav{
  display:flex;align-items:center;
  background:var(--bg);
  border-bottom:1px solid var(--hairline);
  min-height:44px;padding:0 4px;gap:2px;
}
.nav h2{
  margin:0;flex:1;text-align:center;
  font:500 13px/1 var(--mono);
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--fg);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.nav button{
  background:none;border:none;color:var(--fg);
  cursor:pointer;width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  border-radius:4px;transition:background .12s;
}
.nav button:active{background:var(--accent-soft)}
.nav button svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#ebtn{color:var(--fg-2)}
#ebtn svg{fill:currentColor;stroke:none}
#upd{
  font:700 13px/1 var(--dot);
  letter-spacing:.06em;text-transform:uppercase;
  font-variant-numeric:tabular-nums;
  color:var(--fg-2);transition:color .3s;
  flex-shrink:0;max-width:84px;text-align:right;padding-right:4px;
}
#upd.stale{color:var(--red)}
#list{flex:1;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.p{padding:32px 20px;text-align:center;color:var(--fg-2);font:400 11px var(--mono);letter-spacing:.1em;text-transform:uppercase}
.row{
  padding:14px 16px;border-bottom:1px solid var(--hairline);
  display:flex;align-items:center;min-height:64px;
  cursor:pointer;touch-action:manipulation;
}
.row:active{background:var(--accent-soft)}
.ic{width:44px;height:44px;margin-right:14px;flex-shrink:0;border-radius:4px}
.tx{flex:1;overflow:hidden}
.t1{font:700 17px/1.2 var(--sans);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)}
.t2{
  font:400 11px/1.4 var(--mono);letter-spacing:.06em;text-transform:uppercase;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--fg-2);margin-top:4px;
}
.t2.g{color:var(--green)}
.t2.r{color:var(--red)}
.act{
  justify-content:center;min-height:52px;
  color:var(--accent);
  font:400 11px/1 var(--mono);
  letter-spacing:.18em;text-transform:uppercase;
}
.act:active{background:var(--accent);color:var(--bnr)}
.chk{
  width:24px;height:24px;
  border:1.5px solid var(--hairline);border-radius:5px;
  margin-left:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:background .15s,border-color .15s;
}
.chk.on{background:var(--accent);border-color:var(--accent);color:var(--bnr)}
.ar{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;border-bottom:1px solid var(--hairline);min-height:64px;
}
.ar-l{display:flex;align-items:center;gap:14px}
.ar-r{text-align:right;flex-shrink:0}
.tm{font:500 24px/1 var(--mono);font-variant-numeric:tabular-nums;color:var(--fg)}
.st{font:400 11px/1.5 var(--mono);letter-spacing:.1em;text-transform:uppercase;font-variant-numeric:tabular-nums;margin-top:4px}
.st.g{color:var(--green)}
.st.r{color:var(--red)}
.cd{font:400 11px/1.5 var(--mono);letter-spacing:.1em;text-transform:uppercase;font-variant-numeric:tabular-nums;color:var(--fg-2);margin-top:2px}
.hs{font:400 14px/1.3 var(--sans);color:var(--fg-2)}
#bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--accent);display:none;z-index:11;box-shadow:0 0 10px var(--accent-soft)}
@media(prefers-reduced-motion:reduce){#bar{box-shadow:none}}
input{
  background:var(--bg-2);color:var(--fg);
  border:1px solid var(--hairline);
  padding:10px 12px;border-radius:4px;
  width:100%;font:500 16px var(--sans);
  outline:none;
}
input:focus{border-color:var(--accent)}
.sb{padding:12px 16px;border-bottom:1px solid var(--hairline)}
.tg{display:flex;align-items:center;justify-content:space-between;width:100%}
.sec{
  display:flex;align-items:center;gap:10px;
  padding:16px 16px 8px;
  font:700 15px/1 var(--dot);
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);
}
.sec::after{content:'';flex:1;height:1px;background:var(--hairline)}
.edbtn{
  padding:5px 9px;border:1px solid var(--hairline);border-radius:3px;
  font:400 12px var(--mono);cursor:pointer;
  background:var(--bg);color:var(--fg-2);
  margin-left:4px;line-height:1.2;
}
.edbtn:active{border-color:var(--accent);color:var(--accent)}
.sheet-bg{
  position:fixed;inset:0;
  background:rgba(14,11,8,.55);
  backdrop-filter:blur(6px) saturate(110%);
  -webkit-backdrop-filter:blur(6px) saturate(110%);
  z-index:20;display:flex;flex-direction:column;justify-content:flex-end;
  animation:fade-in .16s ease-out;
}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.sheet{
  background:var(--bg);border-radius:18px 18px 0 0;
  box-shadow:var(--shadow);overflow:hidden;
  animation:slide-up .22s cubic-bezier(.32,0,.15,1);
}
@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet::before{
  content:'';display:block;width:36px;height:4px;border-radius:2px;
  background:var(--hairline);margin:10px auto 6px;
}
.sheet-form{padding:16px}
.sheet-label{font:700 14px/1.3 var(--sans);margin-bottom:10px;color:var(--fg)}
.sheet-input{margin-bottom:14px}
.s-item{
  padding:16px 20px;border-bottom:1px solid var(--hairline);
  font:500 16px var(--sans);cursor:pointer;color:var(--fg);
  touch-action:manipulation;
}
.s-item:active{background:var(--accent-soft)}
.s-item:last-child{border-bottom:none}
.s-del{color:var(--red)}
@keyframes skel-pulse{0%,100%{opacity:.3}50%{opacity:.7}}
.skel{background:var(--bg-2);border-radius:4px;animation:skel-pulse 1.4s ease-in-out infinite}
.skel-row{padding:14px 16px;border-bottom:1px solid var(--hairline);display:flex;align-items:center;gap:14px}
.skel-ic{width:44px;height:44px;flex-shrink:0;border-radius:4px}
.skel-tx{flex:1;display:flex;flex-direction:column;gap:8px}
.skel-t1{height:14px;width:58%}
.skel-t2{height:10px;width:38%}
.ptr-spinner{
  position:absolute;left:50%;transform:translateX(-50%);top:-40px;
  width:28px;height:28px;
  border:2px solid var(--hairline);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;display:none;
}
@keyframes spin{to{transform:translateX(-50%) rotate(360deg)}}
#off{
  position:fixed;top:3px;left:0;right:0;
  background:var(--red);color:var(--bg);
  text-align:center;font:700 15px/1 var(--dot);
  letter-spacing:.12em;text-transform:uppercase;
  padding:6px;z-index:12;display:none;
}
@keyframes row-in{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.row-in{animation:row-in .24s ease-out backwards}
@media(prefers-reduced-motion:reduce){.row-in{animation:none}}
.theme-seg{
  display:flex;border:1px solid var(--hairline);border-radius:4px;overflow:hidden;
}
.theme-seg button{
  flex:1;padding:8px 4px;
  background:none;border:none;border-right:1px solid var(--hairline);
  cursor:pointer;color:var(--fg-2);
  font:400 10px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;
  transition:background .15s,color .15s;
}
.theme-seg button:last-child{border-right:none}
.theme-seg button.on{background:var(--accent);color:var(--bnr)}
.inst-banner{display:flex;align-items:center;padding:10px 16px;gap:12px;background:var(--accent-soft);border-bottom:1px solid var(--hairline)}
.inst-banner-tx{flex:1}
.inst-banner-t1{font:600 13px/1.2 var(--sans);color:var(--fg)}
.inst-banner-t2{font:400 11px/1.3 var(--mono);letter-spacing:.04em;color:var(--fg-2);margin-top:2px}
.inst-banner-btn{padding:6px 12px;background:var(--accent);color:var(--bnr);border:none;border-radius:3px;font:700 11px var(--mono);letter-spacing:.1em;text-transform:uppercase;cursor:pointer;flex-shrink:0;touch-action:manipulation}
.inst-banner-x{width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--fg-2);cursor:pointer;flex-shrink:0;font:400 20px var(--sans);touch-action:manipulation}
::view-transition-old(root),::view-transition-new(root){animation-duration:220ms}
@media(prefers-reduced-motion:reduce){::view-transition-old(root),::view-transition-new(root){animation:none}}
</style>
<div id=bar></div>
<div id=off>NO SIGNAL</div>
<div id=app>
  <header id=hdr>
    <span class=hdr-wm>NextTrain</span>
    <span class=hdr-rt>&#9656; Denver&thinsp;&middot;&thinsp;RTD Rail</span>
  </header>
  <div class=nav>
    <button id=back style=visibility:hidden>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2 id=sub></h2>
    <div id=upd></div>
    <button id=ebtn>
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
    </button>
  </div>
  <div id=list></div>
</div>
<script>
const WORKER='https://nt.sloccy.workers.dev';
const K_FAV='nt_f',K_DARK='nt_t',K_REC='nt_r',K_CACHE='nt_c',K_INSTALL='nt_i',K_REC_DISMISS='nt_rd',K_SHOW_RECENT='nt_sr';
const CACHE_TTL=5*60*1000;
const REFRESH_FLOOR_MS=2000;
const REFRESH_FALLBACK_MS=60000;
const DEC=new TextDecoder();
const D2L={'0':'N','1':'S','2':'E','3':'W'};
const L2D={'N':'0','S':'1','E':'2','W':'3'};

let stations=[],favs=[],recent=null;
let recentDismissed=false,showRecent=true;
let themeMode='auto',dark=false;
let editing=false,navStack=[],arrCache={},refreshTimer=null;
let deferredPrompt=null,wakeLock=null;
let subQueue=[],subActive=0,lastLoadTime=0,updTimer=null;
const inflight=new Map();
const lastNextRefresh=new Map();

try{favs=JSON.parse(localStorage.getItem(K_FAV))||[];}catch(_){favs=[];}
if(!Array.isArray(favs))favs=[];
try{recent=JSON.parse(localStorage.getItem(K_REC));}catch(_){recent=null;}
try{recentDismissed=localStorage.getItem(K_REC_DISMISS)==='1';}catch(_){recentDismissed=false;}
try{const v=localStorage.getItem(K_SHOW_RECENT);showRecent=(v===null||v==='1');}catch(_){showRecent=true;}
try{arrCache=JSON.parse(localStorage.getItem(K_CACHE))||{};}catch(_){arrCache={};}
{const now=Date.now();for(const k of Object.keys(arrCache)){if(!arrCache[k].t||now-arrCache[k].t>3600000)delete arrCache[k];}}

function readThemeMode(){
  const v=localStorage.getItem(K_DARK);
  if(v==='on'||v==='off'||v==='auto')return v;
  if(v==='1')return 'on';
  return 'auto';
}
function applyTheme(mode,save){
  themeMode=mode;
  if(save)localStorage.setItem(K_DARK,mode);
  dark=mode==='on'?true:mode==='off'?false:window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.body.classList.toggle('dk',dark);
  const bg=dark?'#0E0B08':'#F2EBDC';
  document.querySelectorAll('meta[name=theme-color]').forEach(m=>m.content=bg);
}
applyTheme(readThemeMode(),false);
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{
  if(themeMode==='auto'){applyTheme('auto',false);render();}
});

const $=id=>document.getElementById(id);

const isStandalone=()=>matchMedia('(display-mode: standalone)').matches||navigator.standalone===true;
const _ua=navigator.userAgent;
const isIOS=/iPad|iPhone|iPod/.test(_ua)&&!window.MSStream;
const isIOSSafari=isIOS&&/Safari/.test(_ua)&&!/CriOS|FxiOS|EdgiOS|OPiOS/.test(_ua);
const isInAppBrowser=/FBAN|FBAV|Instagram|Line|Twitter|Pinterest|WhatsApp/.test(_ua);
const canPromptAndroid=()=>deferredPrompt!==null;
const canPromptIOS=()=>isIOSSafari&&!isStandalone();
const installAvailable=()=>!isStandalone()&&!isInAppBrowser&&(canPromptAndroid()||canPromptIOS());
function installBannerHidden(){
  if(isStandalone())return true;
  try{
    const s=JSON.parse(localStorage.getItem(K_INSTALL)||'{}');
    if(s.installed)return true;
    if(s.dismissedAt&&Date.now()-s.dismissedAt<7*24*60*60*1000)return true;
  }catch(_){}
  return false;
}
async function acquireWake(){
  if(!('wakeLock'in navigator))return;
  try{wakeLock=await navigator.wakeLock.request('screen');}
  catch(_){wakeLock=null;}
}
async function releaseWake(){
  if(wakeLock){try{await wakeLock.release();}catch(_){}wakeLock=null;}
}

function netProfile(){
  const c=navigator.connection;
  if(!c)return{timeout:6000,refresh:60000,concurrency:2};
  if(c.saveData||c.effectiveType==='slow-2g'||c.effectiveType==='2g')
    return{timeout:9000,refresh:300000,concurrency:1};
  if(c.effectiveType==='3g')
    return{timeout:7000,refresh:120000,concurrency:2};
  return{timeout:5000,refresh:60000,concurrency:3};
}

function hap(ms){navigator.vibrate&&navigator.vibrate(ms);}

async function api(path){
  if(inflight.has(path))return inflight.get(path);
  const p=(async()=>{
    let lastErr;
    const np=netProfile();
    for(let i=0;i<2;i++){
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),np.timeout*(i+1));
      $('bar').style.display='block';
      try{
        const res=await fetch(WORKER+path,{signal:ctrl.signal});
        if(!res.ok)throw new Error(res.status);
        const nr=res.headers.get('x-next-refresh');
        lastNextRefresh.set(path,nr?Number(nr)*1000:null);
        return new Uint8Array(await res.arrayBuffer());
      }catch(e){lastErr=e;}
      finally{
        clearTimeout(tid);
        if(inflight.size<=1)$('bar').style.display='none';
      }
    }
    throw lastErr;
  })();
  inflight.set(path,p);
  p.finally(()=>inflight.delete(path));
  return p;
}

function freshCache(key){const c=arrCache[key];return(c&&c.t&&Date.now()-c.t<CACHE_TTL)?c:null;}
function saveCache(){localStorage.setItem(K_CACHE,JSON.stringify(arrCache));}

function enqueueSub(fav){subQueue.push(fav);pumpSub();}
function pumpSub(){
  const limit=netProfile().concurrency;
  while(subActive<limit&&subQueue.length){
    const fav=subQueue.shift();subActive++;
    fetchFavSub(fav).finally(()=>{subActive--;pumpSub();});
  }
}

function fmtTime(mins){
  const d=new Date();
  d.setHours(Math.floor(mins/60),mins%60,0,0);
  return d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
}

function stLabel(st){
  if(st===-128)return{lbl:'CXLD',cls:'r'};
  if(st===-127)return{lbl:'SKIP',cls:'r'};
  if(st===-126)return{lbl:'ON TIME',cls:'g'};
  if(st>0)return{lbl:'LATE',cls:'r'};
  if(st<0)return{lbl:'EARLY',cls:'g'};
  return{lbl:'SCHED',cls:''};
}
function fmtCountdown(predictedMins){
  const n=new Date(),nowMins=n.getHours()*60+n.getMinutes();
  let d=predictedMins-nowMins;
  if(d<-720)d+=1440;
  if(d<=0)return'NOW';
  if(d>=60)return Math.floor(d/60)+'h '+(d%60)+'m';
  return d+' MIN';
}

function parseStations(b){
  if(!b||b.length<6)return[];
  try{
    let p=6,cnt=b[4]|(b[5]<<8),out=[];
    for(let i=0;i<cnt;i++){
      const sl=b[p++];
      const slug=DEC.decode(b.subarray(p,p+sl));p+=sl;
      const rc=b[p++],routes=[];
      for(let j=0;j<rc;j++){
        const r=b[p++],g=b[p++],bl=b[p++],rl=b[p++];
        const name=DEC.decode(b.subarray(p,p+rl));p+=rl;
        const dir=String.fromCharCode(b[p++]);
        const hl=b[p++];
        const headsign=DEC.decode(b.subarray(p,p+hl));p+=hl;
        routes.push({c:`rgb(${r},${g},${bl})`,n:name,d:dir,h:headsign});
      }
      out.push({s:slug,n:slug.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase()),r:routes});
    }
    return out;
  }catch(_){return[];}
}

function parseArrivals(b){
  if(!b||!b.length)return[];
  const out=[];
  try{
    let p=1;
    for(let i=0;i<b[0];i++){
      const rl=b[p++];
      const rn=DEC.decode(b.subarray(p,p+rl));p+=rl;
      const dir=String.fromCharCode(b[p++]);
      const mins=(b[p++]<<8)|b[p++];
      const st=new Int8Array([b[p++]])[0];
      out.push({rn,dir,mins,st});
    }
  }catch(_){}
  return out;
}

function drawIcon(sta,fav){
  const dpr=window.devicePixelRatio||1;
  const sz44=44;
  const cv=document.createElement('canvas');
  cv.width=cv.height=sz44*dpr;
  cv.style.width=cv.style.height=sz44+'px';
  const ctx=cv.getContext('2d');
  ctx.scale(dpr,dpr);
  const rts=((fav&&fav.routes)||[]).map(fr=>{
    const letter=D2L[fr.d]||fr.d;
    return((sta&&sta.r)||[]).find(r=>r.n[0]===fr.r&&r.d===letter);
  }).filter(Boolean);
  const n=Math.min(rts.length,4);
  if(!n)return cv.toDataURL();

  const accentColor=getComputedStyle(document.body).getPropertyValue('--accent').trim()||'#C46A1A';
  const ox=4,oy=4,sz=36,mid=18,e=35;
  const rr=(x,y,w,h,rad)=>{
    if(ctx.roundRect){ctx.roundRect(x,y,w,h,rad);return;}
    ctx.beginPath();
    ctx.moveTo(x+rad,y);ctx.lineTo(x+w-rad,y);ctx.quadraticCurveTo(x+w,y,x+w,y+rad);
    ctx.lineTo(x+w,y+h-rad);ctx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
    ctx.lineTo(x+rad,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-rad);
    ctx.lineTo(x,y+rad);ctx.quadraticCurveTo(x,y,x+rad,y);ctx.closePath();
  };

  if(n===1){
    ctx.fillStyle=rts[0].c;ctx.beginPath();rr(ox,oy,sz,sz,4);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 22px "DM Sans",system-ui';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(rts[0].n[0],22,23);
  }else{
    ctx.save();
    ctx.beginPath();rr(ox,oy,sz,sz,4);ctx.clip();
    if(n===2){
      ctx.fillStyle=rts[0].c;
      ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+sz,oy);ctx.lineTo(ox,oy+sz);ctx.closePath();ctx.fill();
      ctx.fillStyle=rts[1].c;
      ctx.beginPath();ctx.moveTo(ox+sz,oy);ctx.lineTo(ox+sz,oy+sz);ctx.lineTo(ox,oy+sz);ctx.closePath();ctx.fill();
    }else if(n===3){
      ctx.fillStyle=rts[0].c;ctx.fillRect(ox,oy,mid,mid);
      ctx.fillStyle=rts[1].c;ctx.fillRect(ox+mid,oy,mid,mid);
      ctx.fillStyle=rts[2].c;ctx.fillRect(ox,oy+mid,sz,mid);
    }else{
      ctx.fillStyle=rts[0].c;ctx.fillRect(ox,oy,mid,mid);
      ctx.fillStyle=rts[1].c;ctx.fillRect(ox+mid,oy,mid,mid);
      ctx.fillStyle=rts[2].c;ctx.fillRect(ox,oy+mid,mid,mid);
      ctx.fillStyle=rts[3].c;ctx.fillRect(ox+mid,oy+mid,mid,mid);
    }
    ctx.restore();
    const slots=[[ox+9,oy+9],[ox+27,oy+9],[ox+9,oy+27],[ox+27,oy+27]];
    ctx.fillStyle='#fff';ctx.font='bold 13px "DM Sans",system-ui';
    ctx.textAlign='center';ctx.textBaseline='middle';
    if(n===2){ctx.fillText(rts[0].n[0],slots[0][0],slots[0][1]);ctx.fillText(rts[1].n[0],slots[3][0],slots[3][1]);}
    else if(n===3){ctx.fillText(rts[0].n[0],slots[0][0],slots[0][1]);ctx.fillText(rts[1].n[0],slots[1][0],slots[1][1]);ctx.fillText(rts[2].n[0],22,oy+27);}
    else{rts.forEach((rt,i)=>ctx.fillText(rt.n[0],slots[i][0],slots[i][1]));}
  }

  const dirs=new Set(((fav&&fav.routes)||[]).map(rt=>rt.d));
  ctx.fillStyle=accentColor;
  const ar=(cx,cy,rot)=>{
    ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);
    ctx.beginPath();ctx.moveTo(0,-4);ctx.lineTo(-3,1);ctx.lineTo(3,1);ctx.fill();
    ctx.restore();
  };
  if(dirs.has('0'))ar(22,2,0);
  if(dirs.has('1'))ar(22,42,Math.PI);
  if(dirs.has('2'))ar(42,22,Math.PI/2);
  if(dirs.has('3'))ar(2,22,-Math.PI/2);
  return cv.toDataURL();
}

function showSheet(items){
  return new Promise(resolve=>{
    const bg=document.createElement('div');bg.className='sheet-bg';
    const sh=document.createElement('div');sh.className='sheet';
    const done=v=>{document.body.removeChild(bg);resolve(v);};
    items.forEach(({label,value,del})=>{
      const d=document.createElement('div');
      d.className='s-item'+(del?' s-del':'');
      d.textContent=label;
      d.addEventListener('click',()=>done(value));
      sh.appendChild(d);
    });
    const cancel=document.createElement('div');
    cancel.className='s-item s-del';cancel.textContent='Cancel';
    cancel.addEventListener('click',()=>done(null));
    sh.appendChild(cancel);
    bg.appendChild(sh);
    bg.addEventListener('click',ev=>{if(ev.target===bg)done(null);});
    document.body.appendChild(bg);
  });
}

function showInput(label,def){
  return new Promise(resolve=>{
    const bg=document.createElement('div');bg.className='sheet-bg';
    const sh=document.createElement('div');sh.className='sheet sheet-form';
    const lbl=document.createElement('div');lbl.className='sheet-label';lbl.textContent=label;

    const done=v=>{document.body.removeChild(bg);resolve(v);};
    const save=document.createElement('div');save.className='s-item';save.textContent='Save';
    save.addEventListener('click',()=>done(inp.value.trim()||null));
    const cancel=document.createElement('div');cancel.className='s-item s-del';cancel.textContent='Cancel';
    cancel.addEventListener('click',()=>done(null));
    sh.appendChild(lbl);sh.appendChild(inp);sh.appendChild(save);sh.appendChild(cancel);
    bg.appendChild(sh);
    bg.addEventListener('click',ev=>{if(ev.target===bg)done(null);});

  });
}

function tickUpd(){
  const el=$('upd');if(!el||!lastLoadTime)return;
  const sec=Math.floor((Date.now()-lastLoadTime)/1000);
  const refresh=netProfile().refresh/1000;
  const txt=sec<5?'LIVE':sec<60?sec+'s':Math.floor(sec/60)+'m';
  el.textContent=txt;
  el.className=sec>refresh*2?'stale':'';
}

  }

  }
  favs.forEach((fav,idx)=>{
    const sta=stations.find(s=>s.s===fav.s);

    const row=document.createElement('div');row.className='row';

    const img=document.createElement('img');

    }else{
      t2.className='t2';
      const skelLine=document.createElement('span');

      t2.appendChild(skelLine);
    }
    tx.appendChild(t1);tx.appendChild(t2);
    row.appendChild(img);row.appendChild(tx);

    if(editing){
      const btns=document.createElement('div');
      btns.style.cssText='display:flex;gap:3px;margin-left:6px;flex-shrink:0';
      [
        {l:'↑',fn:()=>{if(idx>0){[favs[idx],favs[idx-1]]=[favs[idx-1],favs[idx]];saveFavs();render();}}},
        {l:'↓',fn:()=>{if(idx<favs.length-1){[favs[idx],favs[idx+1]]=[favs[idx+1],favs[idx]];saveFavs();render();}}},
        {l:'R',fn:async()=>{const n=await showInput('Rename',fav.n||(sta&&sta.n)||fav.s);if(n){fav.n=n;saveFavs();render();}}},
        {l:'×',fn:async()=>{const v=await showSheet([{label:'Confirm Delete',value:'del',del:true}]);if(v==='del'){favs.splice(idx,1);saveFavs();render();}}}
      ].forEach(({l,fn})=>{
        const btn=document.createElement('button');
        btn.className='edbtn';btn.textContent=l;
        btn.addEventListener('click',ev=>{ev.stopPropagation();fn();});
        btns.appendChild(btn);
      });
      row.appendChild(btns);
    }

    let lpTimer=null;
    row.addEventListener('pointerdown',()=>{
      lpTimer=setTimeout(async()=>{
        hap(20);
        const items=[];
        if(idx>0)items.push({label:'↑ Move Up',value:'up'});
        if(idx<favs.length-1)items.push({label:'↓ Move Down',value:'down'});
        items.push({label:'Rename',value:'rename'});
        items.push({label:'Delete',value:'delete',del:true});
        const action=await showSheet(items);
        if(!action)return;
        if(action==='up'){[favs[idx],favs[idx-1]]=[favs[idx-1],favs[idx]];saveFavs();render();}
        else if(action==='down'){[favs[idx],favs[idx+1]]=[favs[idx+1],favs[idx]];saveFavs();render();}
        else if(action==='rename'){const n=await showInput('Rename',fav.n||(sta&&sta.n)||fav.s);if(n){fav.n=n;saveFavs();render();}}
        else if(action==='delete'){const v=await showSheet([{label:'Confirm Delete',value:'del',del:true}]);if(v==='del'){favs.splice(idx,1);saveFavs();render();}}
      },500);
    });
    const cancelLp=()=>{clearTimeout(lpTimer);lpTimer=null;};
    row.addEventListener('pointerup',cancelLp);
    row.addEventListener('pointermove',cancelLp);
    row.addEventListener('pointercancel',cancelLp);

    row.addEventListener('click',()=>{hap(8);push('arrivals',{sta,fav});});
    L.appendChild(row);
    if(!cached)enqueueSub(fav);
  });

  if(recent && showRecent && !recentDismissed){
    try{
      const sec=document.createElement('div');sec.className='sec';sec.textContent='RECENT';
      L.appendChild(sec);
      const sta=stations.find(s=>s.s===recent.s);
      const row=document.createElement('div');row.className='row';row.style.cssText='overflow:hidden;transition:transform .2s,opacity .2s';
      const img=document.createElement('img');
      img.className='ic';img.width=img.height=44;img.src=drawIcon(sta,recent);
      const tx=document.createElement('div');tx.className='tx';
      const t1=document.createElement('div');t1.className='t1';t1.textContent=(sta&&sta.n)||recent.s;
      const t2=document.createElement('div');t2.className='t2';t2.textContent='Tap to view';
      tx.appendChild(t1);tx.appendChild(t2);
      row.appendChild(img);row.appendChild(tx);

      const dismissNow=()=>{
        recentDismissed=true;
        localStorage.setItem(K_REC_DISMISS,'1');
        render();
      };

      let lpTimer=null,startX=0,startY=0,dx=0,swiped=false,pointerDown=false;
      row.addEventListener('pointerdown',e=>{
        startX=e.clientX;startY=e.clientY;dx=0;swiped=false;pointerDown=true;
        lpTimer=setTimeout(async()=>{
          hap(20);
          const v=await showSheet([{label:'Dismiss',value:'dismiss',del:true}]);
          if(v==='dismiss')dismissNow();
        },500);
      });
      row.addEventListener('pointermove',e=>{
        if(!pointerDown)return;
        dx=e.clientX-startX;
        const dy=e.clientY-startY;
        if(!swiped&&Math.abs(dx)>8&&Math.abs(dx)>Math.abs(dy)){
          swiped=true;
          clearTimeout(lpTimer);lpTimer=null;
          row.setPointerCapture(e.pointerId);
        }
        if(swiped){
          row.style.transition='none';
          row.style.transform='translateX('+dx+'px)';
          row.style.opacity=String(Math.max(0.4,1-Math.abs(dx)/300));
        }
      });
      const endSwipe=()=>{
        if(!pointerDown)return;
        pointerDown=false;
        clearTimeout(lpTimer);lpTimer=null;
        if(swiped){
          if(Math.abs(dx)>80){
            row.style.transition='transform .2s,opacity .2s';
            row.style.transform='translateX('+(dx>0?400:-400)+'px)';
            row.style.opacity='0';
            setTimeout(dismissNow,200);
          }else{
            row.style.transition='transform .2s,opacity .2s';
            row.style.transform='translateX(0)';
            row.style.opacity='1';
          }
        }
      };
      row.addEventListener('pointerup',endSwipe);
      row.addEventListener('pointercancel',endSwipe);

      row.addEventListener('click',()=>{if(swiped)return;push('arrivals',{sta,r:recent.r,routes:recent.routes});});
      L.appendChild(row);
    }catch(_){}
  }

  const ns=document.createElement('div');ns.className='row act';ns.textContent='+ New Search';
  ns.addEventListener('click',()=>push('picker',{q:''}));
  L.appendChild(ns);

  const sg=document.createElement('div');sg.className='row act';sg.textContent='Settings';
  sg.addEventListener('click',()=>push('settings'));
  L.appendChild(sg);
}

function renderArrivals(cont,arrivals,sta,rParam,rList){
  cont.innerHTML='';
  const isFav=favs.find(f=>f.s===sta.s&&f.r===rParam);
  if(!isFav){
    const addBtn=document.createElement('div');addBtn.className='row act';
    addBtn.textContent='☆ Add Favorite';
    addBtn.addEventListener('click',()=>{
      favs.push({s:sta.s,r:rParam,n:sta.n,routes:rList||[]});
      saveFavs();reset();
    });
    cont.appendChild(addBtn);
  }
  if(!arrivals.length){
    cont.insertAdjacentHTML('beforeend','<div class=p>No arrivals</div>');
  }
  arrivals.forEach((arr,i)=>{
    const route=(sta.r||[]).find(rt=>rt.n===arr.rn&&rt.d===arr.dir)||{};
    const{lbl,cls}=stLabel(arr.st);
    const predicted=arr.st<=-126?arr.mins:arr.mins+arr.st;

    if(i===0){arrCache[sta.s+rParam]={txt:'Next: '+timeStr,cls,t:Date.now()};saveCache();}
    const row=document.createElement('div');row.className='ar';
    const left=document.createElement('div');left.className='ar-l';
    const img=document.createElement('img');img.width=img.height=44;
    img.src=drawIcon(sta,{routes:[{r:arr.rn[0],d:L2D[arr.dir]||arr.dir}]});
    const info=document.createElement('div');
    const hsDiv=document.createElement('div');hsDiv.className='hs';hsDiv.textContent=route.h||'';
    const stDiv=document.createElement('div');stDiv.className='st'+(cls?' '+cls:'');stDiv.textContent=lbl;
    info.appendChild(hsDiv);info.appendChild(stDiv);
    left.appendChild(img);left.appendChild(info);
    const right=document.createElement('div');right.className='ar-r';
    const tm=document.createElement('div');tm.className='tm';tm.textContent=timeStr;
    const cd=document.createElement('div');cd.className='cd';cd.textContent=fmtCountdown(predicted);
    right.appendChild(tm);right.appendChild(cd);

    });
    cont.appendChild(remBtn);
  }
}

  const cont=document.createElement('div');

    tickUpd();
  }

  if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null;}

  let ptrStart=0,ptrActive=false,spinner=null;
  spinner=document.createElement('div');spinner.className='ptr-spinner';
  L.style.position='relative';L.style.overflowY='auto';
  L.insertBefore(spinner,cont);

  L.addEventListener('touchstart',e=>{
    if(L.scrollTop===0)ptrStart=e.touches[0].clientY;
  },{passive:true});
  L.addEventListener('touchmove',e=>{
    if(!ptrStart)return;
    const dy=e.touches[0].clientY-ptrStart;
    if(dy>70&&!ptrActive){ptrActive=true;spinner.style.display='block';}
  },{passive:true});
  L.addEventListener('touchend',()=>{
    if(ptrActive){hap(15);load();}
    ptrStart=0;ptrActive=false;if(spinner)spinner.style.display='none';
  },{passive:true});

  const load=async()=>{
    if(!navigator.onLine){return;}
    try{
      const bytes=await api('/a?s='+sta.s+'&r='+rParam);
      const arrivals=parseArrivals(bytes);
      arrCache[sta.s+rParam]={txt:'Next: '+(arrivals[0]?fmtTime(arrivals[0].st<=-126?arrivals[0].mins:arrivals[0].mins+arrivals[0].st):'—'),cls:arrivals[0]?stLabel(arrivals[0].st).cls:'',rows:arrivals,t:Date.now()};
      saveCache();
      lastLoadTime=Date.now();
      failCount=0;
      if(updTimer)clearInterval(updTimer);
      updTimer=setInterval(tickUpd,15000);
      tickUpd();
      renderArrivals(cont,arrivals,sta,rParam,rList);
    }catch(_){
      failCount++;
      if(!cont.querySelector('.ar')&&!cont.querySelector('.row')){
        cont.innerHTML='<div class=p>Error loading arrivals</div>';
      }
    }
  };

  let failCount=0;
  const aPath='/a?s='+sta.s+'&r='+rParam;
  function scheduleNextLoad(){
    clearTimeout(refreshTimer);
    const nr=lastNextRefresh.get(aPath);
    let delay;
    if(!nr){
      delay=failCount>0?Math.min(REFRESH_FALLBACK_MS,REFRESH_FLOOR_MS*(2**failCount)):REFRESH_FALLBACK_MS;
    }else{
      delay=Math.max(REFRESH_FLOOR_MS,nr-Date.now());
    }
    refreshTimer=setTimeout(()=>load().finally(scheduleNextLoad),delay);
  }

  load().finally(scheduleNextLoad);

  if(navigator.connection){
    const onConnChange=()=>{load().finally(scheduleNextLoad);};
    navigator.connection.addEventListener('change',onConnChange);
    params._cleanConn=onConnChange;
  }
}

function viewSettings(L){
  const thRow=document.createElement('div');thRow.className='row';
  const tg=document.createElement('div');tg.className='tg';
  const label=document.createElement('span');label.textContent='Appearance';
  const seg=document.createElement('div');seg.className='theme-seg';
  const modes=[{l:'Light',v:'off'},{l:'Auto',v:'auto'},{l:'Dark',v:'on'}];
  modes.forEach(({l,v})=>{
    const btn=document.createElement('button');
    btn.textContent=l;
    if(themeMode===v)btn.className='on';
    btn.addEventListener('click',ev=>{
      ev.stopPropagation();
      applyTheme(v,true);
      seg.querySelectorAll('button').forEach((b,i)=>b.classList.toggle('on',modes[i].v===themeMode));
    });
    seg.appendChild(btn);
  });
  tg.appendChild(label);tg.appendChild(seg);thRow.appendChild(tg);
  L.appendChild(thRow);

  const srRow=document.createElement('div');srRow.className='row';
  const srTg=document.createElement('div');srTg.className='tg';
  const srLabel=document.createElement('span');srLabel.textContent='Show Last Search';
  const srSeg=document.createElement('div');srSeg.className='theme-seg';
  [{l:'On',v:true},{l:'Off',v:false}].forEach(({l,v},i)=>{
    const btn=document.createElement('button');
    btn.textContent=l;
    if(showRecent===v)btn.className='on';
    btn.addEventListener('click',ev=>{
      ev.stopPropagation();
      showRecent=v;
      localStorage.setItem(K_SHOW_RECENT,v?'1':'0');
      srSeg.querySelectorAll('button').forEach((b,j)=>b.classList.toggle('on',j===i));
    });
    srSeg.appendChild(btn);
  });
  srTg.appendChild(srLabel);srTg.appendChild(srSeg);srRow.appendChild(srTg);
  L.appendChild(srRow);

  const efRow=document.createElement('div');efRow.className='row act';efRow.textContent='Edit Favorites';
  efRow.addEventListener('click',()=>push('editFavs'));
  L.appendChild(efRow);

  const rfRow=document.createElement('div');rfRow.className='row act';rfRow.textContent='Refresh Station Data';
  rfRow.addEventListener('click',async()=>{
    rfRow.textContent='Refreshing…';
    try{
      const bytes=await api('/s');
      stations=parseStations(bytes);
      rfRow.textContent='Done!';
      setTimeout(()=>{rfRow.textContent='Refresh Station Data';},2000);
    }catch(_){
      rfRow.textContent='Error — tap to retry';
    }
  });
  L.appendChild(rfRow);

  if(!isStandalone()&&!isInAppBrowser&&installAvailable()){
    const instRow=document.createElement('div');instRow.className='row act';instRow.textContent='Install App';
    instRow.addEventListener('click',()=>triggerInstall());
    L.appendChild(instRow);
  }
}

function viewEditFavs(L){
  if(!favs.length){L.innerHTML='<div class=p>No favorites</div>';return;}
  favs.forEach((fav,idx)=>{
    const sta=stations.find(s=>s.s===fav.s);
    const row=document.createElement('div');row.className='row';
    const img=document.createElement('img');
    img.className='ic';img.width=img.height=44;img.src=drawIcon(sta,fav);
    const tx=document.createElement('div');tx.className='tx';
    const t1=document.createElement('div');t1.className='t1';t1.textContent=fav.n||(sta&&sta.n)||fav.s;
    const t2=document.createElement('div');t2.className='t2';t2.textContent='⇅ tap to edit';
    tx.appendChild(t1);tx.appendChild(t2);
    row.appendChild(img);row.appendChild(tx);
    row.addEventListener('click',async()=>{
      const items=[];
      if(idx>0)items.push({label:'↑ Move Up',value:'up'});
      if(idx<favs.length-1)items.push({label:'↓ Move Down',value:'down'});
      items.push({label:'Rename',value:'rename'});
      items.push({label:'Delete',value:'delete',del:true});
      const action=await showSheet(items);
      if(!action)return;
      if(action==='up'){[favs[idx],favs[idx-1]]=[favs[idx-1],favs[idx]];saveFavs();render();}
      else if(action==='down'){[favs[idx],favs[idx+1]]=[favs[idx+1],favs[idx]];saveFavs();render();}
      else if(action==='rename'){
        const n=await showInput('Rename',fav.n||(sta&&sta.n)||fav.s);
        if(n){fav.n=n;saveFavs();render();}
      }else if(action==='delete'){
        const v=await showSheet([{label:'Confirm Delete',value:'del',del:true}]);
        if(v==='del'){favs.splice(idx,1);saveFavs();render();}
      }
    });
    L.appendChild(row);
  });
}

async function fetchFavSub(fav){
  try{
    const bytes=await api('/a?s='+fav.s+'&r='+fav.r);
    const arr=parseArrivals(bytes);
    if(arr.length){
      const{cls}=stLabel(arr[0].st);
      arrCache[fav.s+fav.r]={txt:'Next: '+fmtTime(arr[0].st<=-126?arr[0].mins:arr[0].mins+arr[0].st),cls,t:Date.now()};
      saveCache();
      if(navStack.length&&navStack[navStack.length-1].view==='home')render();
    }
  }catch(_){}
}

function render(){
  if(!navStack.length)return;
  const{view,params}=navStack[navStack.length-1];

  if(refreshTimer&&view!=='arrivals'){
    clearInterval(refreshTimer);refreshTimer=null;
    if(navigator.connection&&navStack.length>1){
      const prev=navStack[navStack.length-2];
      if(prev&&prev.params&&prev.params._cleanConn){
        navigator.connection.removeEventListener('change',prev.params._cleanConn);
        prev.params._cleanConn=null;
      }
    }
  }
  if(updTimer&&view!=='arrivals'){clearInterval(updTimer);updTimer=null;$('upd').textContent='';}
  if(view!=='home'){subQueue=[];}

  $('back').style.visibility=navStack.length>1?'visible':'hidden';
  $('ebtn').style.visibility=view==='home'?'visible':'hidden';
  const titles={
    home:'',picker:'Select Station',
    routes:(params.sta&&params.sta.n)||'',
    arrivals:(params.sta&&params.sta.n)||(params.fav&&params.fav.n)||'',
    settings:'Settings',editFavs:'Edit Favorites'
  };
  $('sub').textContent=titles[view]||'';

  const L=$('list');L.innerHTML='';

  if(view==='home')viewHome(L);
  else if(view==='picker')viewPicker(L,params);
  else if(view==='routes')viewRoutes(L,params);
  else if(view==='arrivals')viewArrivals(L,params);
  else if(view==='settings')viewSettings(L);
  else if(view==='editFavs')viewEditFavs(L);

  if(view==='arrivals')acquireWake();else releaseWake();

  Array.from(L.children).slice(0,8).forEach((el,i)=>{
    el.classList.add('row-in');
    el.style.animationDelay=i*28+'ms';
  });
}

$('hdr').addEventListener('click',reset);
$('back').addEventListener('click',()=>{hap(8);pop();});
$('ebtn').addEventListener('click',()=>{editing=!editing;render();});

let swipeStart=null;
document.addEventListener('touchstart',e=>{
  if(navStack.length>1&&e.touches[0].clientX<24)swipeStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
  else swipeStart=null;
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!swipeStart)return;
  const dx=e.touches[0].clientX-swipeStart.x;
  const dy=Math.abs(e.touches[0].clientY-swipeStart.y);
  if(dx>60&&dy<40){swipeStart=null;hap(8);pop();}
  else if(dy>20)swipeStart=null;
},{passive:true});

function updateOffline(){
  $('off').style.display=navigator.onLine?'none':'block';
}
window.addEventListener('online',()=>{
  updateOffline();
  if(refreshTimer===null&&navStack.length&&navStack[navStack.length-1].view==='arrivals'){
    render();
  }else if(navStack.length&&navStack[navStack.length-1].view==='home'){
    subQueue=[];favs.forEach(f=>enqueueSub(f));
  }
});
window.addEventListener('offline',()=>{
  updateOffline();
  if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null;}
});
updateOffline();

document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null;}
    releaseWake();
  }else if(navStack.length&&navStack[navStack.length-1].view==='arrivals'){
    acquireWake();
    render();
  }
});

addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;render();});
addEventListener('appinstalled',()=>{deferredPrompt=null;localStorage.setItem(K_INSTALL,JSON.stringify({installed:1}));render();});

try{
  const swbc=new BroadcastChannel('nt');
  swbc.onmessage=ev=>{
    if(ev.data&&ev.data.type==='fresh'&&navStack.length&&navStack[navStack.length-1].view==='home')render();
  };
}catch(_){}

(async()=>{
  navStack=[{view:'home',params:{}}];
  render();
  try{
    const bytes=await api('/s');
    stations=parseStations(bytes);
    render();
  }catch(_){}
})();

if('serviceWorker'in navigator){
  navigator.serviceWorker.register('sw.js');
  navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload());
}
</script>
