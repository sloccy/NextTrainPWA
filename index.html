<!DOCTYPE html><html lang=en><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1,user-scalable=no"><meta name=theme-color content=#000><link rel=manifest href=manifest.json><title>NextTrain</title><style>
:root{--bg:#fff;--fg:#000;--gray:#888;--light:#ddd;--green:#008000;--red:#c00}
*{box-sizing:border-box}
body{margin:0;font:16px system-ui,sans-serif;background:var(--bg);color:var(--fg);-webkit-tap-highlight-color:transparent}
#a{display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{padding:12px;display:flex;align-items:center;background:var(--bg);border-bottom:1px solid var(--light);min-height:48px}
header h1{margin:0;font-size:1.1rem;flex:1;text-align:center;font-weight:700}
header button{background:none;border:none;color:var(--fg);font-size:1.5rem;padding:0 8px;cursor:pointer}
#L{flex:1;overflow-y:auto}
.p{padding:20px;text-align:center;color:var(--gray)}
.i{padding:12px;border-bottom:1px solid #eee;display:flex;align-items:center;min-height:56px}
.i:active{background:#f0f0f0}
.ic{width:44px;height:44px;position:relative;margin-right:12px;flex-shrink:0}
.ric{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;border:1px solid rgba(0,0,0,0.1)}
.tx{flex:1;overflow:hidden}
.t1{font-weight:700;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t2{font-size:14px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act{color:var(--fg);justify-content:center;font-weight:500;min-height:44px}
.chk{width:22px;height:22px;border:2px solid var(--fg);margin-left:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chk.on::after{content:'\2713';font-size:18px}
.ar{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #eee}
.ar-l{display:flex;align-items:center;gap:12px}
.ar-r{text-align:right}
.tm{font-size:20px;font-weight:700}
.st{font-size:14px;font-weight:700}
.st.green{color:var(--green)}
.st.red{color:var(--red)}
.hs{font-size:14px;color:var(--gray)}
#b{position:fixed;top:0;left:0;right:0;height:2px;background:#29f;display:none;z-index:9}
</style>
<div id=b></div>
<div id=a>
<header><button id=back style="visibility:hidden">&lsaquo;</button><h1 id=h>NextTrain</h1><div style="width:40px"></div></header>
<div id=L></div>
</div>
<script>
const W='https://nt.sloccy.workers.dev',C='nt_s',F='nt_f',e=i=>document.getElementById(i),t=new TextDecoder;
let S=[],f=JSON.parse(localStorage.getItem(F)||'[]'),stk=[],cache={};

const api=async p=>{e('b').style.display='block';try{const r=await fetch(W+p);return {b:new Uint8Array(await r.arrayBuffer()),h:r.headers}}finally{e('b').style.display='none'}};
const ps=b=>{let p=6,c=b[4]|b[5]<<8,R=[];for(let i=0;i<c;i++){let l=b[p++],s=t.decode(b.subarray(p,p+l));p+=l;let rc=b[p++],rs=[];for(let j=0;j<rc;j++){let r=b[p++],g=b[p++],bl=b[p++],rl=b[p++],rn=t.decode(b.subarray(p,p+rl));p+=rl;let d=String.fromCharCode(b[p++]),hl=b[p++],h=t.decode(b.subarray(p,p+hl));p+=hl;rs.push({c:`rgb(${r},${g},${bl})`,n:rn,d,h})}R.push({s,r:rs,n:s.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())})}return R};

const go=(v,p)=>{stk.push({v,p});render()};
const pop=()=>{if(stk.length>1){stk.pop();render()}};
e('back').onclick=pop;

const drawRic=(r,s=24)=>{return `<div class="ric" style="background:${r.c};width:${s}px;height:${s}px;font-size:${s/2}px">${r.n[0]}</div>`};

const render=()=>{
  const {v,p}=stk[stk.length-1];
  e('back').style.visibility=stk.length>1?'visible':'hidden';
  const L=e('L');L.innerHTML='';
  
  if(v=='home'){
    e('h').innerText='NextTrain';
    if(!f.length) L.innerHTML='<div class=p>No favorites yet — tap below</div>';
    f.forEach((fav,i)=>{
      const s=S.find(x=>x.s==fav.s);
      const div=document.createElement('div');div.className='i';
      let icons='';
      if(s){
        const routes=fav.r.split('').map((c,idx)=>{
          if(idx%2!=0)return null;
          const rName=c,dCode=fav.r[idx+1],dm={0:'N',1:'S',2:'E',3:'W'};
          return s.r.find(r=>r.n[0]==rName&&r.d==dm[dCode]);
        }).filter(x=>x);
        if(routes.length>1){
          icons=`<div style="position:absolute;top:0;left:0">${drawRic(routes[0],28)}</div><div style="position:absolute;bottom:0;right:0">${drawRic(routes[1],28)}</div>`;
        } else if(routes.length==1) icons=drawRic(routes[0],44);
      }
      const sub=cache[fav.s+fav.r]||'Loading...';
      div.innerHTML=`<div class=ic>${icons}</div><div class=tx><div class=t1>${fav.n||s?.n||fav.s}</div><div class=t2>${sub}</div></div>`;
      div.onclick=()=>go('arrivals',{s,fav});
      L.appendChild(div);
    });
    const add=document.createElement('div');add.className='i act';add.innerText='+ New Search';
    add.onclick=()=>go('picker');L.appendChild(add);
  }
  
  if(v=='picker'){
    e('h').innerText='Select Station';
    if(!S.length) L.innerHTML='<div class=p>Loading stations...</div>';
    S.forEach(s=>{
      const div=document.createElement('div');div.className='i';
      div.innerHTML=`<div class=tx><div class=t1>${s.n}</div></div>`;
      div.onclick=()=>go('routes',{s,sel:[]});
      L.appendChild(div);
    });
  }
  
  if(v=='routes'){
    e('h').innerText=p.s.n;
    p.s.r.forEach((r,i)=>{
      const div=document.createElement('div');div.className='i';
      const is=p.sel.includes(i);
      div.innerHTML=`<div class=ic>${drawRic(r,44)}</div><div class=tx><div class=t1>${r.h}</div><div class=t2>(${r.d})</div></div><div class="chk${is?' on':''}"></div>`;
      div.onclick=()=>{if(is)p.sel=p.sel.filter(x=>x!=i);else p.sel.push(i);render()};
      L.appendChild(div);
    });
    if(p.sel.length){
      const ok=document.createElement('div');ok.className='i act';ok.innerText='Show Arrivals';
      ok.onclick=()=>{
        const dm={N:'0',S:'1',E:'2',W:'3'};
        const rp=p.sel.map(i=>p.s.r[i].n[0]+dm[p.s.r[i].d]).join('');
        go('arrivals',{s:p.s,r:rp});
      };
      L.appendChild(ok);
    }
  }
  
  if(v=='arrivals'){
    e('h').innerText=p.s.n;
    const rParam=p.fav?p.fav.r:p.r;
    L.innerHTML='<div class=p>...</div>';
    (async()=>{
      try {
        const {b,h}=await api('/a?s='+p.s.s+'&r='+rParam);
        L.innerHTML='';
        let ptr=1;
        for(let i=0;i<b[0];i++){
          let rl=b[ptr++],rn=t.decode(b.subarray(ptr,ptr+rl));ptr+=rl;
          let D=String.fromCharCode(b[ptr++]),m=b[ptr++]<<8|b[ptr++],st=new Int8Array([b[ptr++]])[0];
          let x=p.s.r.find(r=>r.n==rn&&r.d==D)||{c:'#888',h:''},lbl="Scheduled",cls='';
          if(st==-128) {lbl="Canceled";cls='red'}
          else if(st==-126) {lbl="On time";cls='green'}
          else if(st>0) {lbl="Delayed "+st+"m";cls='green'}
          else if(st<0) {lbl="Early "+-st+"m";cls='red'}
          const T=new Date;T.setHours(m/60,m%60);
          const timeStr=T.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
          if(i==0) cache[p.s.s+rParam]=`Next: ${timeStr} (${rn})`;
          const div=document.createElement('div');div.className='ar';
          div.innerHTML=`<div class=ar-l>${drawRic(x,44)}<div class=tx><div class=hs>${x.h}</div><div class="st ${cls}">${lbl}</div></div></div><div class=ar-r><div class=tm>${timeStr}</div><div class=hs>${rn}</div></div>`;
          L.appendChild(div);
        }
        if(!b[0])L.innerHTML='<div class=p>No arrivals</div>';
        
        const isF=f.find(x=>x.s==p.s.s&&x.r==rParam);
        const favAct=document.createElement('div');favAct.className='i act';
        favAct.innerText=isF?'\u2605 Remove Favorite':'\u2606 Add Favorite';
        favAct.onclick=()=>{
          if(isF) f=f.filter(x=>!(x.s==p.s.s&&x.r==rParam));
          else f.push({s:p.s.s,r:rParam,n:p.s.n});
          localStorage.setItem(F,JSON.stringify(f));
          if(!isF) {stk=[{v:'home'}];render()} else render();
        };
        L.appendChild(favAct);
      } catch(e) { L.innerHTML='<div class=p>Error loading arrivals</div>' }
    })();
  }
};

(async()=>{
  const c=localStorage.getItem(C);if(c){try{S=ps(new Uint8Array(JSON.parse(c)));}catch(e){}}
  stk=[{v:'home'}];render();
  try{const {b}=await api('/s');S=ps(b);localStorage.setItem(C,JSON.stringify([...b]));render()}catch(e){}
})();
navigator.serviceWorker?.register('sw.js');
</script>
</html>
